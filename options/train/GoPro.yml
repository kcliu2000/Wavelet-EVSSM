name: EVSSM_Wavelet_GoPro
model_type: ImageRestorationModel
scale: 1
num_gpu: 1
manual_seed: 42

datasets:
  train:
    name: gopro-train
    type: PairedImageDataset
    dataroot_gt: /home/m11302124/MIMO-UNet-Wavelet/dataset/GOPRO/train_lmdb/sharp_crops.lmdb
    dataroot_lq: /home/m11302124/MIMO-UNet-Wavelet/dataset/GOPRO/train_lmdb/blur_crops.lmdb

    filename_tmpl: '{}'
    io_backend:
      type: lmdb

    gt_size: 128
    use_flip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 8
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: gopro-test
    type: PairedImageDataset
    dataroot_gt: /home/m11302124/MIMO-UNet-Wavelet/dataset/GOPRO/test_lmdb/sharp_crops.lmdb
    dataroot_lq: /home/m11302124/MIMO-UNet-Wavelet/dataset/GOPRO/test_lmdb/blur_crops.lmdb
    io_backend:
      type: lmdb


network_g:
  type: EVSSM
  inp_channels: 3
  out_channels: 3
  dim: 48
  num_blocks: [6,6,12]
  ffn_expansion_factor: 3
  bias: False
  wave_name: haar  # 🌟 新增：明確指定小波名稱



# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  resume_state: /home/m11302124/EVSSM/experiments/EVSSM_Wavelet_GoPro/training_states/100000.state

# training settings
train:
  optim_g:
    type: AdamW
    lr: !!float 1e-3
    weight_decay: !!float 1e-3
    betas: [0.9, 0.9]

  scheduler:
    type: TrueCosineAnnealingLR
    T_max: 300000
    eta_min: !!float 1e-7

  total_iter: 300000
  warmup_iter: -1 # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  fft_loss_opt:
    type: FFTLoss
    loss_weight: 0.1
    reduction: mean

# validation settings
val:
  val_freq: !!float 1e4
  save_img: false


  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 0
      test_y_channel: false
    ssim:
      type: calculate_ssim
      crop_border: 0
      test_y_channel: false

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 1e4
  use_tb_logger: true
  wandb:
    project: EVSSM-Wavelet
    resume_id: a5of1m3b

# dist training settings
dist_params:
  backend: nccl
  port: 29500
